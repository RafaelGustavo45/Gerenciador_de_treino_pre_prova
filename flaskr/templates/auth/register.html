{% extends 'base.html' %}

{% block title %}Register — Flaskr{% endblock %}

{% block content %}
    <h1>Criar Conta</h1>
    <form method="POST">
        <label>
            Username
            <input type="text" name="username" required>
        </label>
        <label>
            Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Registrar</button>
    </form>
    <p>Já tem uma conta? <a href="{{ url_for('auth.login') }}">Faça Log In</a></p>
{% endblock %}
