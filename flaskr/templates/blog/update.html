{% extends 'base.html' %}

{% block title %}Edit Prova — Flaskr{% endblock %}

{% block content %}
    <h1>Editar Prova</h1>
    <form method="POST">
        <label>
            Título:
            <input type="text" name="titulo" value="{{ prova['titulo'] }}" required style="width: 100%; max-width: 500px;">
        </label>
        <label>
            Série:
            <input type="text" name="titulo" value="{{ prova['serie'] }}" required style="width: 100%; max-width: 500px;">
        </label>
        <label>
            Matéria:
            <textarea name="body" rows="10" style="width: 100%; max-width: 500px;" required>{{ prova['materia'] }}</textarea>
        </label>    
        <button type="submit">Salvar Alterações</button>
        <a href="{{ url_for('blog.index') }}" style="margin-left: 15px;">Cancelar</a>
    </form>
    
    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ccc; max-width: 500px;">
    
    <form method="POST" action="{{ url_for('blog.delete', id=prova['id']) }}" onsubmit="return confirm('Tem certeza que deseja deletar esta prova permanentemente?');">
        <button type="submit" class="btn-danger">Deletar Prova</button>
    </form>
{% endblock %}
