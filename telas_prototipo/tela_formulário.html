<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Prova</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
        .config-box { background: #fff; padding: 20px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 20px; }
        .questao-box { background: #eef; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 5px solid #007bff; }
        input { display: block; margin: 5px 0 15px 0; padding: 8px; width: 100%; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="config-box">
    <h2>Configuração da Prova</h2>
    <label>Título:</label> <input type="text" id="titulo">
    <label>Série:</label> <input type="number" id="serie">
    <label>Matéria:</label> <input type="text" id="materia">
    <label>Qtd. Questões (1-100):</label> <input type="number" id="qtdQuestoes" min="1" max="100">
    <label>Qtd. Alternativas (3-5):</label> <input type="number" id="qtdAlternativas" min="3" max="5">
    <button onclick="gerarFormulario()">Gerar Campos de Questões</button>
</div>

<div id="containerQuestoes"></div>

<script>
    function gerarFormulario() {
        const qtdQ = document.getElementById('qtdQuestoes').value;
        const qtdA = document.getElementById('qtdAlternativas').value;
        const container = document.getElementById('containerQuestoes');
        
        container.innerHTML = '<h3>Elaboração das Questões</h3>';

        for (let i = 1; i <= qtdQ; i++) {
            let htmlQ = `<div class="questao-box">
                <label><strong>Questão ${i}:</strong></label>
                <input type="text" placeholder="Texto da questão">`;
            
            // Loop para as alternativas
            for (let j = 0; j < qtdA; j++) {
                let letra = String.fromCharCode(65 + j);
                htmlQ += `<input type="text" placeholder="Alternativa ${letra}">`;
            }
            
            // Campo de resposta correta
            htmlQ += `<label> Questão correta (1 a ${qtdA}): </label> 
                      <input type="number" min="1" max="${qtdA}" value="1">
                      </div>`; // Fechamento da div questao-box
            
            container.innerHTML += htmlQ;
        }

        container.innerHTML += '<button style="background: #28a745;">Enviar Prova Completa</button>';
    }
</script>

</body>
</html>
