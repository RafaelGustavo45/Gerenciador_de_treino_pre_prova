<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Treino Pré-Prova</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .btn-add { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; }
        .actions button { margin-right: 5px; cursor: pointer; padding: 5px 10px; }
        .btn-train { background-color: #007bff; color: white; border: none; border-radius: 3px; }
        .btn-edit { background-color: #ffc107; border: none; border-radius: 3px; }
        .btn-del { background-color: #dc3545; color: white; border: none; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Minhas Provas</h1>
    <button class="btn-add">+ Adicionar Nova Prova</button>

    <table>
        <thead>
            <tr>
                <th>Título</th>
                <th>Série</th>
                <th>Matéria</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Prova Concurso</td>
                <td>2</td>
                <td>Direito Penal</td>
                <td class="actions">
                    <button class="btn-train">Treinar</button>
                    <button class="btn-edit">Alterar</button>
                    <button class="btn-del">Deletar</button>
                </td>
            </tr>
            <tr>
                <td>Prova Faculdade</td>
                <td>7</td>
                <td>Grafos</td>
                <td class="actions">
                    <button class="btn-train">Treinar</button>
                    <button class="btn-edit">Alterar</button>
                    <button class="btn-del">Deletar</button>
                </td>
            </tr>
            <tr>
                <td>Prova Revisão</td>
                <td>4</td>
                <td>Banco de Dados</td>
                <td class="actions">
                    <button class="btn-train">Treinar</button>
                    <button class="btn-edit">Alterar</button>
                    <button class="btn-del">Deletar</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
